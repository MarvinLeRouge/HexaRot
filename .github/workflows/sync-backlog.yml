name: Sync backlog — BACKLOG.md to GitHub Issues and Kanban

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'BACKLOG.md'
  workflow_dispatch:

jobs:
  sync:
    name: Sync BACKLOG.md
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install @octokit/rest @octokit/graphql
        working-directory: .github/scripts

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ secrets.HEXAROT_PROJECT_TOKEN }}
          GITHUB_OWNER: MarvinLeRouge
          GITHUB_REPO: HexaRot
          PROJECT_ID: PVT_kwHOAA1qPc4BSIDU
        run: node .github/scripts/sync-backlog.js
